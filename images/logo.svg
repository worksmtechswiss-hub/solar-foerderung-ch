<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48">
  <defs>
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Icon: Abstract sun with rays on dark rounded square -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="#1E293B"/>
  <!-- Sun circle -->
  <circle cx="20" cy="24" r="9" fill="url(#sun-grad)"/>
  <!-- Sun rays -->
  <g stroke="#F59E0B" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="9" x2="20" y2="12"/>
    <line x1="20" y1="36" x2="20" y2="39"/>
    <line x1="5" y1="24" x2="8" y2="24"/>
    <line x1="32" y1="24" x2="35" y2="24"/>
    <line x1="9.4" y1="13.4" x2="11.5" y2="15.5"/>
    <line x1="28.5" y1="32.5" x2="30.6" y2="34.6"/>
    <line x1="9.4" y1="34.6" x2="11.5" y2="32.5"/>
    <line x1="28.5" y1="15.5" x2="30.6" y2="13.4"/>
  </g>
  <!-- Small solar panel accent on sun -->
  <rect x="16" y="20" width="8" height="8" rx="1" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="28" stroke="#1E293B" stroke-width="0.6" opacity="0.3"/>
  <line x1="16" y1="24" x2="24" y2="24" stroke="#1E293B" stroke-width="0.6" opacity="0.3"/>
  <!-- Brand text -->
  <text x="50" y="22" font-family="'IBM Plex Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#1E293B" letter-spacing="-0.3">solar-foerderung</text>
  <text x="50" y="38" font-family="'IBM Plex Sans',system-ui,sans-serif" font-size="11" font-weight="500" fill="#64748B" letter-spacing="0.5">.ch</text>
  <!-- Accent dot -->
  <circle cx="196" cy="35" r="2.5" fill="#F59E0B"/>
</svg>