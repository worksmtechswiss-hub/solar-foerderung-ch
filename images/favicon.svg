<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="64" height="64" rx="14" fill="#1E293B"/>
  <!-- Sun circle -->
  <circle cx="32" cy="32" r="12" fill="url(#sg)"/>
  <!-- Sun rays -->
  <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="11" x2="32" y2="16"/>
    <line x1="32" y1="48" x2="32" y2="53"/>
    <line x1="11" y1="32" x2="16" y2="32"/>
    <line x1="48" y1="32" x2="53" y2="32"/>
    <line x1="17.1" y1="17.1" x2="20.7" y2="20.7"/>
    <line x1="43.3" y1="43.3" x2="46.9" y2="46.9"/>
    <line x1="17.1" y1="46.9" x2="20.7" y2="43.3"/>
    <line x1="43.3" y1="20.7" x2="46.9" y2="17.1"/>
  </g>
  <!-- Subtle solar grid on sun -->
  <rect x="26" y="26" width="12" height="12" rx="1.5" fill="none" stroke="#1E293B" stroke-width="1" opacity="0.25"/>
  <line x1="32" y1="26" x2="32" y2="38" stroke="#1E293B" stroke-width="0.8" opacity="0.25"/>
  <line x1="26" y1="32" x2="38" y2="32" stroke="#1E293B" stroke-width="0.8" opacity="0.25"/>
</svg>